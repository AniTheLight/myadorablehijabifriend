<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Adorable Hijabi Friend</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="basket.css">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Playfair+Display:ital,wght@1,700&family=Cormorant+Garamond:wght@300;400;600&display=swap" rel="stylesheet">
  <link href="https://fonts.cdnfonts.com/css/cooper-black" rel="stylesheet">
  <style>
    /* ─── Reset ─────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family: 'Nunito', sans-serif; background: #EDC1BB; -webkit-font-smoothing: antialiased; }

    /* ─── Nav ───────────────────────────────────────── */
    .nav { display: flex; justify-content: flex-end; align-items: center; padding: 1rem 2.5rem; background: #E7DFE1; border-bottom: 2px solid #EDC1BB; gap: 24px; position: sticky; top: 0; z-index: 100; }
    .nav-links { display: flex; gap: 2rem; list-style: none; }
    .nav-links a { font-size: 13px; font-weight: 700; color: #7e98a8; text-decoration: none; transition: color 0.2s; }
    .nav-links a:hover { color: #CD7250; }
    .nav-basket { position: relative; display: flex; align-items: center; color: #7e98a8; text-decoration: none; transition: color 0.2s; }
    .nav-basket:hover { color: #CD7250; }
    .basket-count { position: absolute; top: -6px; right: -8px; background: #CD7250; color: #fff; font-size: 9px; font-weight: 900; width: 16px; height: 16px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }

    /* Mobile nav */
    .hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; padding: 4px; }
    .hamburger span { display: block; width: 22px; height: 2px; background: #7e98a8; border-radius: 2px; }
    .mobile-menu { display: none; flex-direction: column; background: #E7DFE1; border-bottom: 2px solid #EDC1BB; max-height: 0; overflow: hidden; transition: max-height 0.3s ease, padding 0.3s ease; }
    .mobile-menu.open { max-height: 200px; padding: 1rem 0; }
    .mobile-menu a { font-size: 14px; font-weight: 700; color: #7e98a8; text-decoration: none; padding: 0.6rem 1.5rem; display: block; }
    .mobile-menu a:hover { color: #CD7250; }

    /* ─── Breadcrumb ─────────────────────────────────── */
    .breadcrumb { padding: 1rem 2.5rem 0; font-size: 11px; color: #CD7250; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; opacity: 0.7; }
    .breadcrumb a { color: #CD7250; text-decoration: none; }
    .breadcrumb a:hover { opacity: 0.7; }

    /* ─── Product Section ────────────────────────────── */
    .product-section { display: grid; grid-template-columns: 1fr 1fr; gap: 0; background: #EDC1BB; padding: 2rem 2.5rem 3rem; }

    /* Image col */
    .product-img-col { padding-right: 2rem; }
    .product-img-main { border-radius: 20px; aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
    .product-img-main img { width: 100%; height: 100%; object-fit: cover; border-radius: 20px; }
    .img-placeholder { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; width: 100%; height: 100%; border-radius: 20px; }
    .img-placeholder span { font-size: 11px; font-weight: 700; color: #CD7250; text-transform: uppercase; letter-spacing: 1px; opacity: 0.5; }
    .thumb-row { display: flex; gap: 10px; margin-top: 12px; }
    .thumb { width: 64px; height: 64px; border-radius: 12px; border: 2px solid transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 9px; color: #CD7250; font-weight: 700; text-transform: uppercase; text-align: center; line-height: 1.4; transition: border-color 0.2s; overflow: hidden; }
    .thumb img { width: 100%; height: 100%; object-fit: cover; border-radius: 10px; }
    .thumb.active { border-color: #CD7250; }

    /* Inline stars */
    .inline-stars { display: flex; align-items: center; gap: 6px; }
    .inline-stars .stars { display: flex; gap: 1px; }
    .inline-stars .star { color: #E99075; font-size: 14px; }
    .inline-stars .avg { font-size: 11px; font-weight: 700; color: #CD7250; }
    .inline-stars .count { font-size: 10px; color: #aaa; font-weight: 700; }
    .review-chevron { display: flex; align-items: center; justify-content: center; width: 20px; height: 20px; background: #EDC1BB; border-radius: 50%; text-decoration: none; color: #CD7250; font-size: 13px; font-weight: 900; transform: rotate(90deg); transition: background 0.2s; }
    .review-chevron:hover { background: #CD7250; color: #fff; }

    /* Info col */
    .product-info-col { padding-left: 1rem; display: flex; flex-direction: column; gap: 1.1rem; }
    .product-eyebrow { font-size: 10px; font-weight: 700; letter-spacing: 3px; color: #7e98a8; text-transform: uppercase; }
    .product-name { font-family: 'Cormorant Garamond', serif; font-size: clamp(26px, 3vw, 36px); font-weight: 300; color: #CD7250; line-height: 1.1; }
    .product-price { font-family: 'Cormorant Garamond', serif; font-size: 26px; font-weight: 600; color: #CD7250; }
    .product-desc { font-size: 14px; color: #a0756a; line-height: 1.85; }

    /* Qty */
    .qty-wrapper { display: flex; align-items: center; gap: 12px; }
    .qty-label { font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: #7e98a8; }
    .qty-controls { display: flex; align-items: center; background: #fff; border-radius: 50px; overflow: hidden; }
    .qty-btn { background: #e891a1; border: none; width: 32px; height: 32px; font-size: 18px; font-weight: 900; color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background 0.15s; line-height: 1; }
    .qty-btn:hover { background: #CD7250; }
    .qty-btn.minus { border-radius: 50px 0 0 50px; }
    .qty-btn.plus { border-radius: 0 50px 50px 0; }
    .qty-num { width: 32px; text-align: center; font-size: 14px; font-weight: 900; color: #e891a1; background: #fff; }

    /* Buttons */
    .btn-row { display: flex; gap: 10px; }
    .add-btn { background: #E99075; color: #fff; font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 14px; padding: 13px 0; border-radius: 50px; border: none; cursor: pointer; flex: 1; box-shadow: 0 4px 0 #b86840; transition: background 0.2s, transform 0.1s, box-shadow 0.1s; }
    .add-btn:hover { background: #CD7250; }
    .buy-btn { background: #E99075; color: #fff; font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 14px; padding: 13px 0; border-radius: 50px; border: none; cursor: pointer; flex: 1; box-shadow: 0 4px 0 #b86840; transition: background 0.2s, transform 0.1s, box-shadow 0.1s; }
    .buy-btn:hover { background: #CD7250; transform: translateY(2px); box-shadow: 0 2px 0 #b86840; }

    /* Accordion */
    .accordion { border-top: 1.5px solid #d4a090; }
    .accordion-item { border-bottom: 1.5px solid #d4a090; }
    .accordion-header { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; cursor: pointer; }
    .accordion-header span { font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: #a0756a; }
    .accordion-header i { font-size: 16px; color: #CD7250; transition: transform 0.2s; }
    .accordion-body { font-size: 13px; color: #a0756a; line-height: 1.85; padding-bottom: 12px; display: none; }
    .accordion-body.open { display: block; }
    .acc-badges { display: flex; gap: 12px; margin-bottom: 12px; }
    .acc-badge { display: flex; flex-direction: column; align-items: center; gap: 4px; flex: 1; background: #fdf5f3; border-radius: 12px; padding: 10px 6px; }
    .acc-badge-icon { font-size: 18px; }
    .acc-badge-title { font-size: 10px; font-weight: 900; color: #CD7250; text-align: center; }
    .acc-badge-sub { font-size: 9px; color: #a0756a; text-align: center; line-height: 1.4; }

    /* ─── Related ────────────────────────────────────── */
    .related-section { background: #fff; padding: 3rem 2.5rem; }
    .section-eyebrow { font-size: 10px; font-weight: 700; letter-spacing: 3px; color: #7e98a8; text-transform: uppercase; text-align: center; margin-bottom: 6px; }
    .section-title { font-family: 'Cormorant Garamond', serif; font-size: clamp(24px, 4vw, 34px); font-weight: 300; color: #CD7250; text-align: center; margin-bottom: 2rem; }
    .related-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem; }
    .related-card { display: flex; flex-direction: column; align-items: center; gap: 10px; cursor: pointer; text-decoration: none; }
    .related-img { width: 100%; aspect-ratio: 1/1; border-radius: 18px; display: flex; align-items: center; justify-content: center; transition: transform 0.2s; overflow: hidden; }
    .related-card:hover .related-img { transform: translateY(-4px); }
    .related-img img { width: 100%; height: 100%; object-fit: cover; }
    .related-name { font-size: 13px; font-weight: 700; color: #555; text-align: center; }
    .related-price { font-family: 'Cormorant Garamond', serif; font-size: 16px; font-weight: 600; color: #CD7250; }

    /* ─── Reviews ────────────────────────────────────── */
    .reviews-section { background: #EDC1BB; padding: 3rem 2.5rem; }
    .reviews-grid { display: grid; grid-template-columns: 1fr 1.6fr; gap: 2rem; align-items: start; }
    .review-score-box { background: #fff; border-radius: 20px; padding: 1.5rem; display: flex; flex-direction: column; align-items: center; gap: 8px; }
    .rscore-big { font-family: 'Cormorant Garamond', serif; font-size: 56px; font-weight: 300; color: #CD7250; line-height: 1; }
    .rscore-outof { font-size: 11px; color: #aaa; font-weight: 700; }
    .rscore-stars { display: flex; gap: 3px; }
    .rscore-star { color: #E99075; font-size: 16px; }
    .rscore-count { font-size: 11px; color: #aaa; font-weight: 700; }
    .bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; width: 100%; }
    .bar-label { font-size: 10px; color: #aaa; font-weight: 700; width: 34px; text-align: right; flex-shrink: 0; }
    .bar-track { flex: 1; height: 6px; background: #f0ebe9; border-radius: 3px; overflow: hidden; }
    .bar-fill { height: 100%; background: #E99075; border-radius: 3px; }
    .reviews-list { display: flex; flex-direction: column; gap: 12px; }
    .review-card { background: #fff; border-radius: 16px; padding: 1.1rem 1.25rem; }
    .review-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
    .review-name { font-size: 13px; font-weight: 900; color: #CD7250; }
    .review-date { font-size: 11px; color: #aaa; font-weight: 700; }
    .review-stars { display: flex; gap: 2px; margin-bottom: 8px; }
    .review-star { color: #E99075; font-size: 12px; }
    .review-text { font-size: 12px; color: #888; line-height: 1.75; }

    /* ─── Footer ─────────────────────────────────────── */
    .footer { background: #7e98a8; padding: 3rem 2rem 2.5rem; text-align: center; }
    .footer-title { font-family: 'Cooper Black', serif; font-size: 24px; color: #fff; margin-bottom: 0.4rem; }
    .footer-sub { font-family: 'Playfair Display', serif; font-size: 15px; font-style: italic; color: #E7DFE1; margin-bottom: 1.75rem; }
    .footer-socials { display: flex; justify-content: center; gap: 1rem; flex-wrap: wrap; margin-bottom: 1.75rem; }
    .social-btn { display: inline-flex; align-items: center; gap: 8px; background: #adc2cf; color: #fff; font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 13px; padding: 11px 22px; border-radius: 50px; text-decoration: none; transition: background 0.2s; }
    .social-btn:hover { background: #E7DFE1; color: #7e98a8; }
    .footer-divider { border: none; border-top: 1px solid #adc2cf; margin: 0 auto 1.75rem; width: 50%; }
    .contact-box { background: #adc2cf; border-radius: 18px; display: inline-block; padding: 16px 32px; }
    .contact-label { font-size: 13px; color: #fff; font-weight: 900; margin-bottom: 4px; }
    .contact-email { font-size: 13px; color: #fff; font-weight: 700; }
    .footer-copy { font-size: 11px; color: #dde8ef; margin-top: 1.75rem; opacity: 0.7; }

    /* ─── Toast ──────────────────────────────────────── */
    .toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(20px); background: #CD7250; color: #fff; font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 13px; padding: 10px 24px; border-radius: 50px; box-shadow: 0 4px 16px rgba(0,0,0,0.15); z-index: 300; opacity: 0; pointer-events: none; transition: opacity 0.25s, transform 0.25s; white-space: nowrap; }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ─── Not found ──────────────────────────────────── */
    .not-found { min-height: 60vh; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1rem; text-align: center; padding: 2rem; }
    .not-found h2 { font-family: 'Cormorant Garamond', serif; font-size: 36px; font-weight: 300; color: #CD7250; }
    .not-found p { font-size: 14px; color: #a0756a; }
    .not-found a { display: inline-block; background: #CD7250; color: #fff; font-weight: 900; padding: 12px 28px; border-radius: 50px; text-decoration: none; font-size: 14px; margin-top: 0.5rem; }


    /* ─── Responsive ─────────────────────────────────── */
    @media (max-width: 768px) {
      .nav { padding: 1rem 1.25rem; justify-content: space-between; }
      .nav-links { display: none; }
      .hamburger { display: flex; }
      .breadcrumb { padding: 1rem 1.25rem 0; }
      .product-section { grid-template-columns: 1fr; padding: 1.25rem 1.25rem 2rem; }
      .product-img-col { padding-right: 0; margin-bottom: 0.5rem; }
      .product-info-col { padding-left: 0; }
      .product-name { white-space: normal; }
      .related-section { padding: 2rem 1.25rem; }
      .related-grid { grid-template-columns: repeat(3, 1fr); gap: 0.75rem; }
      .related-name { font-size: 11px; }
      .reviews-section { padding: 2rem 1.25rem; }
      .reviews-grid { grid-template-columns: 1fr; }
      .footer { padding: 2rem 1.25rem 1.5rem; }
      .footer-socials { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
      .social-btn { justify-content: center; }
      .footer-divider { width: 80%; }
    }

    @media (max-width: 480px) {
      .product-name { font-size: 28px; }
      .btn-row { flex-direction: column; }
    }
  </style>
</head>

    // ─── Helpers ────────────────────────────────────
    function starsHTML(count, size = 14) {
      let html = '';
      for (let i = 1; i <= 5; i++) {

        <circle cx="54" cy="51" r="1.5" fill="#fff" opacity="0.6"/>
        <circle cx="76" cy="51" r="1.5" fill="#fff" opacity="0.6"/>

      </svg>`;
    }

    function productImgHTML(product, size = 130) {
      if (product.image) {
        return `<img src="${product.image}" alt="${product.name}">`;
      }
      return `<div class="img-placeholder" style="background:${product.colour};">
        ${dollSVG(product.hijabColour, product.accentColour, size)}
        <span>Product image</span>
      </div>`;
    }

    function thumbHTML(product, index) {
      const labels = ['Front', 'Side', 'Detail'];
      if (product.thumbImages[index]) {
        return `<img src="${product.thumbImages[index]}" alt="${labels[index]}">`;
      }
      const thumbBgs = [product.colour, product.accentColour + '99', product.hijabColour + '33'];
      return `<span style="font-size:8px;font-weight:700;color:#CD7250;text-transform:uppercase;">${labels[index]}</span>`;
    }

    // ─── Render page ─────────────────────────────────
    function renderPage() {
      const params = new URLSearchParams(window.location.search);
      const id = params.get('id');
      const product = products[id];

      if (!product) {
        document.getElementById('pageContent').innerHTML = `
          <div class="not-found">
            <h2>Oops — we can't find that one!</h2>
            <p>The product you're looking for doesn't exist.</p>
            <a href="index.html">← Back to shop</a>
          </div>
          ${footerHTML()}
        `;
        document.title = 'Not Found — My Adorable Hijabi Friend';
        return;
      }

      document.title = `${product.name} — My Adorable Hijabi Friend`;

      // Related products
      const relatedHTML = product.related.map(relId => {
        const rel = products[relId];
        if (!rel) return '';
        return `<a class="related-card" href="product.html?id=${relId}">
          <div class="related-img" style="background:${rel.colour};">
            ${dollSVG(rel.hijabColour, rel.accentColour, 70)}
          </div>
          <p class="related-name">${rel.name}</p>
          <p class="related-price">£${rel.price.toFixed(2)}</p>
        </a>`;
      }).join('');

      // Reviews HTML
      const topReviewsHTML = reviews.map(r => `
        <div class="review-card">
          <div class="review-top">
            <span class="review-name">${r.name}</span>
            <span class="review-date">${r.date}</span>
          </div>
          <div class="review-stars">${starsHTML(r.stars, 12)}</div>
          <p class="review-text">${r.text}</p>
        </div>
      `).join('');

      const thumbBgs = [product.colour, '#dceaf2', '#ede8f5'];

      document.getElementById('pageContent').innerHTML = `
        <div class="breadcrumb">
          <a href="index.html">Home</a> ›
          <a href="index.html">Shop</a> ›
          ${product.name}
        </div>

        <section class="product-section">
          <div class="product-img-col">
            <div class="product-img-main" id="mainImg">
              ${productImgHTML(product)}
            </div>
            <div class="thumb-row">
              <div class="thumb active" style="background:${thumbBgs[0]};" onclick="switchThumb(this, 0)">${thumbHTML(product, 0)}</div>
              <div class="thumb" style="background:${thumbBgs[1]};" onclick="switchThumb(this, 1)">${thumbHTML(product, 1)}</div>
              <div class="thumb" style="background:${thumbBgs[2]};" onclick="switchThumb(this, 2)">${thumbHTML(product, 2)}</div>
            </div>
          </div>

          <div class="product-info-col">
            <p class="product-eyebrow">✦ Keychain Doll</p>
            <h1 class="product-name">${product.name}</h1>
            <p class="product-price">£${product.price.toFixed(2)}</p>
            <div class="inline-stars">
              <div class="stars">${starsHTML(Math.round(reviewStats.avg))}</div>
              <span class="avg">${reviewStats.avg}</span>
              <span class="count">(${reviewStats.total})</span>
              <a href="#reviews" class="review-chevron" title="See all reviews">›</a>
            </div>
            <p class="product-desc">${product.description}</p>
            <div class="qty-wrapper">
              <span class="qty-label">Qty</span>
              <div class="qty-controls">
                <button class="qty-btn minus" onclick="changeQty(-1)">−</button>
                <span class="qty-num" id="qtyNum">1</span>
                <button class="qty-btn plus" onclick="changeQty(1)">+</button>
              </div>
            </div>
            <div class="btn-row">
              <button class="add-btn" onclick="addToBasket()">Add to basket</button>
              <button class="buy-btn" onclick="buyNow()">Buy now →</button>
            </div>
            <div class="accordion">
              <div class="accordion-item">
                <div class="accordion-header" onclick="toggleAcc(this)">
                  <span>Details &amp; Materials</span>
                  <i class="ti ti-plus" aria-hidden="true"></i>
                </div>
                <div class="accordion-body">
                  <div class="acc-badges">
                    <div class="acc-badge"><span class="acc-badge-icon">🎀</span><p class="acc-badge-title">Gift ready</p><p class="acc-badge-sub">Free gift wrapping on request</p></div>
                    <div class="acc-badge"><span class="acc-badge-icon">📦</span><p class="acc-badge-title">Ships fast</p><p class="acc-badge-sub">Dispatched within 2 working days</p></div>
                    <div class="acc-badge"><span class="acc-badge-icon">🚚</span><p class="acc-badge-title">Free shipping</p><p class="acc-badge-sub">On UK orders over £25</p></div>
                  </div>
                  ${product.details}
                </div>
              </div>
              <div class="accordion-item">
                <div class="accordion-header" onclick="toggleAcc(this)">
                  <span>Shipping &amp; Returns</span>
                  <i class="ti ti-plus" aria-hidden="true"></i>
                </div>
                <div class="accordion-body">Standard UK delivery 3–5 working days. Free shipping on orders over £25. Returns accepted within 14 days of receipt in original condition.</div>
              </div>
            </div>
          </div>
        </section>

        <section class="related-section">
          <p class="section-eyebrow">You might also like</p>
          <h2 class="section-title">Meet her friends!</h2>
          <div class="related-grid">${relatedHTML}</div>
        </section>

        <section class="reviews-section" id="reviews">
          <p class="section-eyebrow">What people are saying</p>
          <h2 class="section-title">Customer Reviews</h2>
          <div class="reviews-grid">
            <div class="review-score-box">
              <div class="rscore-big">${reviewStats.avg}</div>
              <div class="rscore-outof">out of 5</div>
              <div class="rscore-stars">${starsHTML(Math.round(reviewStats.avg), 16)}</div>
              <div class="rscore-count">${reviewStats.total} Reviews</div>
              <div style="margin-top:10px;width:100%;">
                ${['5 Star','4 Star','3 Star','2 Star','1 Star'].map((label, i) => `
                  <div class="bar-row">
                    <span class="bar-label">${label}</span>
                    <div class="bar-track"><div class="bar-fill" style="width:${reviewStats.bars[i]}%;"></div></div>
                  </div>
                `).join('')}
              </div>
            </div>
            <div class="reviews-list">${topReviewsHTML}</div>
          </div>
        </section>

        ${footerHTML()}
      `;
    }

    function footerHTML() {
      return `<footer class="footer" id="footer">
        <p class="footer-title">Stay in the loop ✦</p>
        <p class="footer-sub">Follow along for new drops, behind-the-scenes & community love</p>
        <div class="footer-socials">
          <a class="social-btn" href="#">
            <svg width="16" height="16" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/></svg>
            Instagram
          </a>
          <a class="social-btn" href="#">
            <svg width="16" height="16" fill="currentColor" viewBox="0 0 24 24"><path d="M19.59 6.69a4.83 4.83 0 01-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 01-2.88 2.5 2.89 2.89 0 01-2.89-2.89 2.89 2.89 0 012.89-2.89c.28 0 .54.04.79.1V9.01a6.33 6.33 0 00-.79-.05 6.34 6.34 0 00-6.34 6.34 6.34 6.34 0 006.34 6.34 6.34 6.34 0 006.33-6.34V8.69a8.18 8.18 0 004.78 1.52V6.76a4.85 4.85 0 01-1.01-.07z"/></svg>
            TikTok
          </a>
          <a class="social-btn" href="#">
            <svg width="16" height="16" fill="currentColor" viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
            Facebook
          </a>
        </div>
        <hr class="footer-divider"/>
        <div class="contact-box">
          <p class="contact-label">Get in touch 💌</p>
          <p class="contact-email">hello@myadorablehijabifriend.com</p>
        </div>
        <p class="footer-copy">© 2025 My Adorable Hijabi Friend · Made with love in the UK</p>
      </footer>`;
    }

    // ─── Interactivity ───────────────────────────────
    let qty = 1;

    function changeQty(delta) {
      qty = Math.max(1, qty + delta);
      const el = document.getElementById('qtyNum');
      if (el) el.textContent = qty;
    }

    function addToBasket() {
      showToast(`✦ Added to basket!`);
      // Wire to your basket logic here
    }

    function buyNow() {
      // Wire to Stripe checkout here
      showToast('Redirecting to checkout…');
    }

    function switchThumb(el, index) {
      document.querySelectorAll('.thumb').forEach(t => t.classList.remove('active'));
      el.classList.add('active');
      // When you add real images, swap the main image here:
      // document.getElementById('mainImg').innerHTML = ...
    }

    function toggleAcc(header) {
      const body = header.nextElementSibling;
      const icon = header.querySelector('i');
      const isOpen = body.classList.contains('open');
      document.querySelectorAll('.accordion-body').forEach(b => b.classList.remove('open'));
      document.querySelectorAll('.accordion-header i').forEach(i => { i.className = 'ti ti-plus'; });
      if (!isOpen) { body.classList.add('open'); icon.className = 'ti ti-minus'; }
    }

    function toggleMenu() {
      document.getElementById('mobileMenu').classList.toggle('open');
    }

    let toastTimer;
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
    }

    // ─── Init ────────────────────────────────────────
    renderPage();
  </script>
</body>
