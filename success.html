<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    p { font-size: 16px; color: #CD7250; font-weight: 700; max-width: 420px; line-height: 1.8; margin-bottom: 2rem; }
    a { display: inline-block; background: #CD7250; color: #fff; font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 15px; padding: 14px 32px; border-radius: 50px; text-decoration: none; box-shadow: 0 4px 0 #9a4f2f; }
    a:hover { transform: translateY(2px); box-shadow: 0 2px 0 #9a4f2f; }
  </style>
</head>
<body>
  <div class="icon">✦</div>
  <h1>Order confirmed!</h1>
