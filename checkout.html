<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checkout — My Adorable Hijabi Friend</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="basket.css">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Playfair+Display:ital,wght@1,700&family=Cormorant+Garamond:wght@300;400;600&display=swap" rel="stylesheet">
  <link href="https://fonts.cdnfonts.com/css/cooper-black" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family: 'Nunito', sans-serif; background: #f9f3f1; -webkit-font-smoothing: antialiased; }
    .nav { display: flex; justify-content: space-between; align-items: center; padding: 1rem 2.5rem; background: #E7DFE1; border-bottom: 2px solid #EDC1BB; position: sticky; top: 0; z-index: 100; }
    .nav-links { display: flex; gap: 2rem; list-style: none; }
    .nav-links a { font-size: 13px; font-weight: 700; color: #7e98a8; text-decoration: none; transition: color 0.2s; }
    .nav-links a:hover { color: #CD7250; }
    .nav-basket { position: relative; display: flex; align-items: center; color: #7e98a8; cursor: pointer; transition: color 0.2s; }
    .nav-basket:hover { color: #CD7250; }
    .basket-count { position: absolute; top: -6px; right: -8px; background: #CD7250; color: #fff; font-size: 9px; font-weight: 900; width: 16px; height: 16px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
    .breadcrumb { padding: 1rem 2.5rem 0; font-size: 11px; color: #CD7250; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; opacity: 0.7; }
    .breadcrumb a { color: #CD7250; text-decoration: none; }
    .breadcrumb span { opacity: 0.45; }
    .checkout-grid { display: grid; grid-template-columns: 1.4fr 1fr; gap: 28px; padding: 2rem 2.5rem 4rem; max-width: 1000px; margin: 0 auto; }
    .left-col { display: flex; flex-direction: column; gap: 24px; }
    .card { background: #f9f3f1; border-radius: 20px; padding: 28px; border: 2px solid #e891a1; }
    .card-title { font-family: 'Cormorant Garamond', serif; font-size: 24px; font-weight: 300; color: #CD7250; margin-bottom: 22px; }
    .section-label { font-size: 10px; font-weight: 900; letter-spacing: 2.5px; text-transform: uppercase; color: #7e98a8; margin-bottom: 14px; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 18px; }
    .form-grid.full { grid-template-columns: 1fr; }
    .section-gap { margin-top: 22px; padding-top: 22px; border-top: 1.5px solid #f5dde5; }
    .float-field { position: relative; }
    .float-field input, .float-field textarea { width: 100%; background: #fff; border: 1.5px solid #e891a1; border-radius: 12px; padding: 20px 14px 8px; font-family: 'Nunito', sans-serif; font-size: 14px; color: #555; outline: none; transition: border-color 0.15s; }
    .float-field input:focus, .float-field textarea:focus { border-color: #CD7250; }
    .float-field label { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); font-size: 14px; color: #bbb; font-weight: 700; pointer-events: none; transition: all 0.15s ease; }
    .float-field textarea ~ label { top: 16px; transform: none; }
    .float-field input:focus ~ label, .float-field input:not(:placeholder-shown) ~ label,
    .float-field textarea:focus ~ label, .float-field textarea:not(:placeholder-shown) ~ label { top: 7px; transform: none; font-size: 9px; letter-spacing: 1px; text-transform: uppercase; color: #e891a1; font-weight: 900; }
    .float-field textarea { resize: none; height: 90px; padding-top: 20px; }
    .checkbox-row { display: flex; align-items: center; gap: 10px; margin-top: 8px; }
    .checkbox-row input { width: 15px; height: 15px; accent-color: #e891a1; }
    .checkbox-row label { font-size: 12px; color: #aaa; font-weight: 700; }

    /* ── Payment method tabs ── */
    .payment-tabs { display: flex; gap: 10px; margin-bottom: 20px; }
    .pay-tab { flex: 1; display: flex; align-items: center; justify-content: center; gap: 8px; padding: 12px 16px; border: 2px solid #f0ddd8; border-radius: 14px; cursor: pointer; background: #fff; transition: border-color 0.15s, background 0.15s; }
    .pay-tab.active { border-color: #CD7250; background: #fdf5f3; }
    .pay-tab input[type=radio] { display: none; }
    .pay-tab-label { font-family: 'Nunito', sans-serif; font-size: 13px; font-weight: 900; color: #888; }
    .pay-tab.active .pay-tab-label { color: #CD7250; }

    /* ── Stripe pay button ── */
    .stripe-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      background: #635BFF;
      color: #fff;
      font-family: 'Nunito', sans-serif;
      font-weight: 900;
      font-size: 16px;
      padding: 16px;
      border-radius: 50px;
      border: none;
      cursor: pointer;
      box-shadow: 0 5px 0 #4b44cc;
      transition: background 0.2s, transform 0.1s, box-shadow 0.1s;
      margin-top: 18px;
      letter-spacing: 0.3px;
    }
    .stripe-btn:hover { background: #4f46e5; transform: translateY(2px); box-shadow: 0 3px 0 #3730a3; }
    .stripe-btn:disabled { background: #ccc; box-shadow: 0 3px 0 #aaa; cursor: not-allowed; transform: none; }
    .stripe-btn svg { flex-shrink: 0; }

    /* ── PayPal button ── */
    .paypal-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      background: #FFC439;
      color: #003087;
      font-family: 'Nunito', sans-serif;
      font-weight: 900;
      font-size: 16px;
      padding: 16px;
      border-radius: 50px;
      border: none;
      cursor: pointer;
      box-shadow: 0 5px 0 #e6a800;
      transition: background 0.2s, transform 0.1s, box-shadow 0.1s;
      margin-top: 18px;
      letter-spacing: 0.3px;
    }
    .paypal-btn:hover { background: #f0b800; transform: translateY(2px); box-shadow: 0 3px 0 #c49200; }

    /* PayPal SDK renders into this div */
    #paypal-button-container { margin-top: 18px; }

    .secure-note { display: flex; align-items: center; justify-content: center; gap: 6px; margin-top: 12px; font-size: 12px; color: #aaa; font-weight: 700; }

    /* ── Order card ── */
    .order-card { background: #f9f3f1; border-radius: 20px; padding: 22px; border: 2px solid #e891a1; position: sticky; top: 90px; }
    .order-title { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 300; color: #CD7250; margin-bottom: 18px; }
    .order-item { display: flex; align-items: flex-start; gap: 13px; padding: 13px 0; border-bottom: 1.5px solid #f5dde5; }
    .order-item:last-of-type { border-bottom: none; }
    .item-img { width: 54px; height: 54px; border-radius: 12px; background: #f5ddd8; display: flex; align-items: center; justify-content: center; flex-shrink: 0; overflow: hidden; }
    .item-img img { width: 100%; height: 100%; object-fit: cover; }
    .item-body { flex: 1; min-width: 0; }
    .item-top-row { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 8px; }
    .item-name    { font-size: 13px; font-weight: 900; color: #444; line-height: 1.3; }
    .item-variant { font-size: 11px; color: #aaa; font-weight: 700; margin-top: 2px; }
    .remove-btn   { background: none; border: none; cursor: pointer; color: #e891a1; display: flex; align-items: center; flex-shrink: 0; transition: color 0.15s; }
    .remove-btn:hover { color: #CD7250; }
    .item-bottom-row { display: flex; align-items: center; justify-content: space-between; }
    .item-qty { display: flex; align-items: center; gap: 8px; }
    .iqb { width: 22px; height: 22px; border-radius: 50%; border: none; background: #e891a1; color: #fff; font-size: 14px; font-weight: 900; cursor: pointer; display: flex; align-items: center; justify-content: center; line-height: 1; transition: background 0.15s; }
    .iqb:hover { background: #CD7250; }
    .iqn { font-size: 13px; font-weight: 900; color: #CD7250; min-width: 16px; text-align: center; }
    .item-price { font-family: 'Cormorant Garamond', serif; font-size: 17px; font-weight: 600; color: #CD7250; }
    .order-totals { margin-top: 16px; padding-top: 16px; border-top: 1.5px solid #f5dde5; }
    .total-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .total-label { font-size: 13px; color: #aaa; font-weight: 700; }
    .total-value { font-size: 13px; font-weight: 900; color: #555; }
    .total-row.grand { margin-top: 12px; padding-top: 12px; border-top: 1.5px solid #f5dde5; }
    .total-row.grand .total-label { font-size: 15px; font-weight: 900; color: #444; }
    .total-row.grand .total-value { font-family: 'Cormorant Garamond', serif; font-size: 26px; font-weight: 600; color: #CD7250; }
    .promo-row { display: flex; gap: 10px; margin-top: 14px; }
    .promo-row input { flex: 1; background: #fff; border: 1.5px solid #e891a1; border-radius: 50px; padding: 10px 16px; font-family: 'Nunito', sans-serif; font-size: 13px; font-weight: 700; color: #555; outline: none; }
    .promo-row input:focus { border-color: #CD7250; }
    .promo-row button { background: #e891a1; color: #fff; font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 13px; padding: 10px 18px; border-radius: 50px; border: none; cursor: pointer; box-shadow: 0 3px 0 #c4607a; white-space: nowrap; transition: background 0.15s; }
    .promo-row button:hover { background: #CD7250; }
    .empty-msg { text-align: center; padding: 2rem 0; font-size: 14px; color: #aaa; font-weight: 700; }
    .empty-msg a { color: #e891a1; font-weight: 900; text-decoration: none; }
    .footer { background: #7e98a8; padding: 2.5rem 2rem; text-align: center; }
    .footer-title { font-family: 'Cooper Black', serif; font-size: 20px; color: #fff; margin-bottom: 0.3rem; }
    .footer-sub   { font-family: 'Playfair Display', serif; font-size: 14px; font-style: italic; color: #E7DFE1; margin-bottom: 1.5rem; }
    .footer-socials { display: flex; justify-content: center; gap: 1rem; flex-wrap: wrap; margin-bottom: 1.5rem; }
    .social-btn { display: inline-flex; align-items: center; gap: 8px; background: #adc2cf; color: #fff; font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 13px; padding: 10px 20px; border-radius: 50px; text-decoration: none; transition: background 0.2s; }
    .social-btn:hover { background: #E7DFE1; color: #7e98a8; }
    .footer-divider { border: none; border-top: 1px solid #adc2cf; margin: 0 auto 1.5rem; width: 50%; }
    .contact-box  { background: #adc2cf; border-radius: 16px; display: inline-block; padding: 14px 28px; }
    .footer-copy  { font-size: 11px; color: #dde8ef; margin-top: 1.5rem; opacity: 0.7; }
    @media (max-width: 768px) {
      .nav { padding: 1rem 1.25rem; }
      .breadcrumb { padding: 1rem 1.25rem 0; }
      .checkout-grid { grid-template-columns: 1fr; padding: 1.25rem 1.25rem 3rem; }
      .form-grid { grid-template-columns: 1fr; }
      .order-card { position: static; }
      .footer-socials { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
      .social-btn { justify-content: center; }
    }
    @media (max-width: 480px) {
      .card { padding: 18px; }
    }
  </style>
</head>
<body>

  <div id="navMount"></div>
  <div id="pageContent"></div>

  <script src="products.js"></script>
  <script src="basket.js"></script>
  <script src="nav.js"></script>

  <script>
    function getTotal()    { return basket.reduce(function(s,i){ return s + i.price * i.qty; }, 0); }
    function getShipping() { return getTotal() >= 25 ? 'Free' : '£3.99'; }
    function getGrand()    { var t = getTotal(); return t >= 25 ? t : t + 3.99; }

    function removeSVG() {
      return '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>';
    }

    // Stripe SVG logo
    function stripeLogo() {
      return '<img src="images/stripe.png" alt="Stripe" height="20" style="display:block;">';
    }

    // PayPal SVG logo
    function paypalLogo() {
      return '<svg height="20" viewBox="0 0 100 26" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12.237 2.1H5.07a.96.96 0 00-.949.812L1.3 19.094a.576.576 0 00.57.666h3.4l.853-5.418-.027.17a.96.96 0 01.948-.813h1.976c3.878 0 6.914-1.574 7.8-6.126.026-.134.05-.265.07-.393-.112-.059-.112-.059 0 0 .264-1.684-.002-2.83-.96-3.869-.953-1.13-2.678-1.211-4.693-1.211z" fill="#003087"/><path d="M32.948 8.31h-3.4a.576.576 0 00-.569.487l-1.463 9.278-.027.17a.576.576 0 00.57.666h2.735a.576.576 0 00.569-.487l.395-2.503a.96.96 0 01.949-.812h1.118c3.092 0 4.879-1.497 5.344-4.467.21-1.298.009-2.317-.598-3.032-.666-.783-1.845-1.3-3.623-1.3z" fill="#003087"/><path d="M47.5 8.31h-3.4a.576.576 0 00-.569.487l-1.463 9.278-.027.17a.576.576 0 00.57.666h2.735a.576.576 0 00.569-.487l.395-2.503a.96.96 0 01.949-.812h1.118c3.092 0 4.879-1.497 5.344-4.467.21-1.298.009-2.317-.598-3.032-.666-.783-1.845-1.3-3.623-1.3z" fill="#009cde"/></svg>';
    }

    var currentPayMethod = 'stripe';

    function selectPayMethod(method) {
      currentPayMethod = method;
      document.querySelectorAll('.pay-tab').forEach(function(t) { t.classList.remove('active'); });
      document.getElementById('tab-' + method).classList.add('active');
      document.getElementById('stripe-section').style.display = method === 'stripe' ? 'block' : 'none';
      document.getElementById('paypal-section').style.display = method === 'paypal' ? 'block' : 'none';
    }

    function renderCheckout() {
      var items = '';
      if (basket.length === 0) {
        items = '<div class="empty-msg"><p>Your basket is empty.</p><a href="index.html">← Continue shopping</a></div>';
      } else {
        basket.forEach(function(item) {
          var imgHTML = item.image ? '<img src="' + item.image + '" alt="' + item.name + '">' : '';
          items +=
            '<div class="order-item">' +
              '<div class="item-img" style="background:' + (item.colour || '#EDC1BB') + '20;">' + imgHTML + '</div>' +
              '<div class="item-body">' +
                '<div class="item-top-row">' +
                  '<div><div class="item-name">' + item.name + '</div><div class="item-variant">Keychain doll</div></div>' +
                  '<button class="remove-btn" onclick="removeItem(\'' + item.id + '\')">' + removeSVG() + '</button>' +
                '</div>' +
                '<div class="item-bottom-row">' +
                  '<div class="item-qty">' +
                    '<button class="iqb" onclick="adjustQty(\'' + item.id + '\',-1)">&#8722;</button>' +
                    '<span class="iqn">' + item.qty + '</span>' +
                    '<button class="iqb" onclick="adjustQty(\'' + item.id + '\',1)">+</button>' +
                  '</div>' +
                  '<div class="item-price">£' + (item.price * item.qty).toFixed(2) + '</div>' +
                '</div>' +
              '</div>' +
            '</div>';
        });
      }

      document.getElementById('pageContent').innerHTML =
        '<div class="breadcrumb"><a href="index.html">Home</a> <span>›</span> <a href="shop.html">Shop</a> <span>›</span> Checkout</div>' +
        '<div class="checkout-grid">' +
          '<div class="left-col">' +

            // Contact card
            '<div class="card">' +
              '<div class="card-title">Contact details</div>' +
              '<div class="section-label">Personal info</div>' +
              '<div class="form-grid">' +
                '<div class="float-field"><input type="text" placeholder=" " id="fn" required><label for="fn">First name</label></div>' +
                '<div class="float-field"><input type="text" placeholder=" " id="sn" required><label for="sn">Surname</label></div>' +
                '<div class="float-field"><input type="tel" placeholder=" " id="ph" required><label for="ph">Phone number</label></div>' +
                '<div class="float-field"><input type="email" placeholder=" " id="em" required><label for="em">Email address</label></div>' +
              '</div>' +
              '<div class="section-gap">' +
                '<div class="section-label">Delivery address</div>' +
                '<div class="form-grid">' +
                  '<div class="float-field"><input type="text" placeholder=" " id="a1" required><label for="a1">Address line 1</label></div>' +
                  '<div class="float-field"><input type="text" placeholder=" " id="a2"><label for="a2">Address line 2 (optional)</label></div>' +
                  '<div class="float-field"><input type="text" placeholder=" " id="ci" required><label for="ci">City</label></div>' +
                  '<div class="float-field"><input type="text" placeholder=" " id="pc" required><label for="pc">Postcode</label></div>' +
                '</div>' +
                '<div class="form-grid full" style="margin-bottom:0;"><div class="float-field"><textarea placeholder=" " id="nt"></textarea><label for="nt">Order note (optional)</label></div></div>' +
              '</div>' +
            '</div>' +

            // Payment card
            '<div class="card">' +
              '<div class="card-title">Payment</div>' +
              '<div class="section-label">Choose how to pay</div>' +

              // Tabs
              '<div class="payment-tabs">' +
                '<div class="pay-tab active" id="tab-stripe" onclick="selectPayMethod(\'stripe\')">' +
                  '<input type="radio" name="paymethod" checked>' +
                  '<span class="pay-tab-label"> Card via Stripe</span>' +
                '</div>' +
                '<div class="pay-tab" id="tab-paypal" onclick="selectPayMethod(\'paypal\')">' +
                  '<input type="radio" name="paymethod">' +
                  '<span class="pay-tab-label"> PayPal</span>' +
                '</div>' +
              '</div>' +

              // Stripe section
              '<div id="stripe-section">' +
                '<button class="stripe-btn" id="payBtn" onclick="handleStripePayment()">' +
                  stripeLogo() +
                  '<span>Pay securely — £' + getGrand().toFixed(2) + '</span>' +
                '</button>' +
                '<div class="secure-note"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>Secured by Stripe · 256-bit SSL</div>' +
              '</div>' +

              // PayPal section
              '<div id="paypal-section" style="display:none;">' +
                '<p style="font-size:13px;color:#aaa;font-weight:700;margin-bottom:14px;">You\'ll be taken to PayPal to complete your purchase securely.</p>' +
                '<div id="paypal-button-container"></div>' +
                '<div class="secure-note" style="margin-top:14px;"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>Secured by PayPal · Buyer Protection included</div>' +
              '</div>' +

            '</div>' +
          '</div>' +

          // Order summary
          '<div>' +
            '<div class="order-card">' +
              '<div class="order-title">Your order</div>' +
              '<div id="checkoutItems">' + items + '</div>' +
              '<div class="order-totals">' +
                '<div class="total-row"><span class="total-label">Subtotal</span><span class="total-value">£' + getTotal().toFixed(2) + '</span></div>' +
                '<div class="total-row"><span class="total-label">Shipping</span><span class="total-value" style="color:#7e98a8;">' + getShipping() + '</span></div>' +
                '<div class="total-row grand"><span class="total-label">Total</span><span class="total-value">£' + getGrand().toFixed(2) + '</span></div>' +
              '</div>' +
              '<div class="promo-row"><input type="text" id="promoInput" placeholder="Promo code"><button onclick="applyPromo()">Apply</button></div>' +
            '</div>' +
          '</div>' +
        '</div>' +
        '<footer class="footer">' +
          '<p class="footer-title">Stay in the loop ✦</p>' +
          '<p class="footer-sub">Follow along for new drops, behind-the-scenes &amp; community love</p>' +
          '<div class="footer-socials">' +
            '<a class="social-btn" href="#">Instagram</a>' +
            '<a class="social-btn" href="#">TikTok</a>' +
            '<a class="social-btn" href="#">Facebook</a>' +
          '</div>' +
          '<hr class="footer-divider"/>' +
          '<div class="contact-box"><p style="font-size:13px;color:#fff;font-weight:900;margin-bottom:4px;">Get in touch</p><p style="font-size:13px;color:#fff;font-weight:700;">hello@myadorablehijabifriend.com</p></div>' +
          '<p class="footer-copy">© 2025 My Adorable Hijabi Friend · Made with love in the UK</p>' +
        '</footer>';

      // Init PayPal once DOM is ready
      initPayPal();
    }

    function validateForm() {
      var required = [
        { id: 'fn', label: 'First name' },
        { id: 'sn', label: 'Surname' },
        { id: 'ph', label: 'Phone number' },
        { id: 'em', label: 'Email address' },
        { id: 'a1', label: 'Address line 1' },
        { id: 'ci', label: 'City' },
        { id: 'pc', label: 'Postcode' }
      ];
      for (var i = 0; i < required.length; i++) {
        var el = document.getElementById(required[i].id);
        if (el && !el.value.trim()) {
          alert('Please fill in: ' + required[i].label);
          el.focus();
          return false;
        }
      }
      return true;
    }

    async function handleStripePayment() {
      if (basket.length === 0) { alert('Your basket is empty!'); return; }
      if (!validateForm()) return;

      var btn = document.getElementById('payBtn');
      btn.querySelector('span').textContent = 'Processing...';
      btn.disabled = true;

      try {
        var response = await fetch('/api/create-checkout', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            items: basket,
            customerEmail: document.getElementById('em').value.trim(),
            customerName: document.getElementById('fn').value.trim() + ' ' + document.getElementById('sn').value.trim()
          })
        });
        var data = await response.json();
        if (data.url) {
          localStorage.removeItem('mahf_basket');
          window.location.href = data.url;
        } else {
          throw new Error('No URL returned');
        }
      } catch (err) {
        btn.querySelector('span').textContent = 'Pay securely — £' + getGrand().toFixed(2);
        btn.disabled = false;
        alert('Something went wrong. Please try again.');
      }
    }

    function initPayPal() {
      // ── PAYPAL SETUP ──────────────────────────────────────────────────────
      // Replace YOUR_PAYPAL_CLIENT_ID below with your actual Client ID from
      // developer.paypal.com → Apps & Credentials → your app → Client ID
      var PAYPAL_CLIENT_ID = 'AZLHLtjsRhlVhOW9cFRbj6qtRuyDuezQHglOnGTL1j5-6RV6HjKIPmJuC_e2LB4L5UiWURjzx2j-GB3H';

      if (PAYPAL_CLIENT_ID === 'YOUR_PAYPAL_CLIENT_ID') {
        var container = document.getElementById('paypal-button-container');
        if (container) {
          container.innerHTML = '<p style="text-align:center;font-size:13px;color:#e891a1;font-weight:700;padding:14px;">PayPal not yet connected — add your Client ID to checkout.html</p>';
        }
        return;
      }

      // Load PayPal SDK dynamically
      var script = document.createElement('script');
      script.src = 'https://www.paypal.com/sdk/js?client-id=' + PAYPAL_CLIENT_ID + '&currency=GBP';
      script.onload = function() {
        paypal.Buttons({
          style: {
            layout: 'horizontal',
            color:  'gold',
            shape:  'pill',
            label:  'pay',
            height: 50
          },
          createOrder: function(data, actions) {
            if (!validateForm()) return;
            return actions.order.create({
              purchase_units: [{
                amount: {
                  value: getGrand().toFixed(2),
                  currency_code: 'GBP',
                  breakdown: {
                    item_total: { value: getTotal().toFixed(2), currency_code: 'GBP' },
                    shipping:   { value: getTotal() >= 25 ? '0.00' : '3.99', currency_code: 'GBP' }
                  }
                },
                items: basket.map(function(item) {
                  return {
                    name: item.name,
                    unit_amount: { value: item.price.toFixed(2), currency_code: 'GBP' },
                    quantity: String(item.qty)
                  };
                })
              }]
            });
          },
          onApprove: function(data, actions) {
            return actions.order.capture().then(function(details) {
              localStorage.removeItem('mahf_basket');
              window.location.href = 'success.html';
            });
          },
          onError: function(err) {
            alert('PayPal payment failed. Please try again or use card payment.');
          }
        }).render('#paypal-button-container');
      };
      document.head.appendChild(script);
    }

    function removeItem(id) {
      basket = basket.filter(function(i){ return i.id !== id; });
      saveBasket(); renderBasket(); renderCheckout();
    }

    function adjustQty(id, delta) {
      var item = basket.find(function(i){ return i.id === id; });
      if (!item) return;
      item.qty += delta;
      if (item.qty <= 0) basket = basket.filter(function(i){ return i.id !== id; });
      saveBasket(); renderBasket(); renderCheckout();
    }

    function applyPromo() {
      var v = document.getElementById('promoInput');
      if (v && v.value.trim()) alert('Promo "' + v.value.trim() + '" — coming soon!');
    }

    document.addEventListener('DOMContentLoaded', renderCheckout);
  </script>
</body>
</html>
